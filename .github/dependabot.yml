# Dependabot version updates for Ruby gems and GitHub Actions.
# Security alerts: repo Settings → Code security and analysis → Dependabot alerts.
# https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Kyiv
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ruby
    groups:
      rails:
        patterns:
          - rails
          - action*
          - active*
          - railties
      rubocop:
        patterns:
          - rubocop*
      development:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Kyiv
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
