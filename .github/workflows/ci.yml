name: CI

on:
  push:
    branches:
      - '*'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.4
          bundler-cache: true
      - name: RuboCop
        run: bundle exec rubocop
      - name: Brakeman
        run: bundle exec brakeman --no-pager -q -A
      - name: ERB Lint
        run: bundle exec erb_lint --lint-all

  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: somepassword
          MYSQL_DATABASE: tanooki_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.4
          bundler-cache: true
      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev
      - name: Set up environment variables
        run: cp .env.test .env
      - name: Compile assets
        run: |
          bundle exec rails assets:precompile RAILS_ENV=test
      - name: Run tests
        run: |
          bundle exec rake test
