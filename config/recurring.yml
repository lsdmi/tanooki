# Solid Queue recurring tasks (tanooki2 worker). Schedules use app time zone (Europe/Kiev).
# Production cron (Europe/Kiev). VPS whenever/crontab removed after F cutover.

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  youtube_sync_all_channels:
    class: Youtube::SyncAllChannelsVideosJob
    schedule: every day

  purge_expired_epub_exports:
    class: Books::PurgeExpiredEpubExportsJob
    schedule: every day at 4:00am

  weekly_stats_telegram:
    class: WeeklyStatsTelegramJob
    schedule: every wednesday at 3:00pm

  fictions_telegram:
    class: FictionsTelegramJob
    schedule: every thursday at 2:00pm

  publications_telegram:
    class: PublicationsTelegramJob
    schedule: every friday at 3:00pm

  fictions_refresh_dropped_status:
    class: Fictions::RefreshDroppedStatusJob
    schedule: every sunday at 12:00pm

  youtube_telegram:
    class: Youtube::TelegramJob
    schedule: every sunday at 12:00pm
